<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Preparing Chat...</title>
<style>
  body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
  .loader { border: 3px solid #334155; border-top: 3px solid #38bdf8; border-radius: 50%; width: 32px; height: 32px; animation: spin .8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .card { text-align: center; }
  .error { color: #f87171; display: none; margin-top: 12px; font-size: 14px; }
</style>
</head>
<body>
  <div class="card">
    <div class="loader" id="loader"></div>
    <p>Preparing Chat...</p>
    <p class="error" id="errorMsg"></p>
  </div>
  <script>
  (async function() {
    var errEl = document.getElementById('errorMsg');
    var loader = document.getElementById('loader');
    function fail(msg) { loader.style.display = 'none'; errEl.textContent = msg; errEl.style.display = 'block'; }

    var params = new URLSearchParams(window.location.search);
    var token = params.get('token');
    if (!token) { fail('No session. Please log into Sub2API first.'); return; }

    // Get user profile
    var profile;
    try {
      var resp = await fetch('/api/v1/user/profile', { headers: { 'Authorization': 'Bearer ' + token } });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      profile = (await resp.json()).data;
    } catch(e) { fail('Session expired. Please re-login.'); return; }

    var keyName = 'chat-key';
    var apiKey = null;

    // Check existing key
    try {
      var resp2 = await fetch('/api/v1/keys', { headers: { 'Authorization': 'Bearer ' + token } });
      if (resp2.ok) {
        var keys = (await resp2.json()).data.items || [];
        for (var k of keys) {
          if (k.name === keyName) { apiKey = k.key; break; }
        }
      }
    } catch(e) {}

    // Create if not exists
    if (!apiKey) {
      try {
        var resp3 = await fetch('/api/v1/keys', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: keyName, quota: 0 })
        });
        if (resp3.ok) {
          apiKey = (await resp3.json()).data.key;
        } else if (resp3.status === 409) {
          // race condition - key was created by parallel request
          var resp4 = await fetch('/api/v1/keys', { headers: { 'Authorization': 'Bearer ' + token } });
          var keys4 = (await resp4.json()).data.items || [];
          for (var k of keys4) { if (k.name === keyName) { apiKey = k.key; break; } }
        } else {
          throw new Error('HTTP ' + resp3.status);
        }
      } catch(e) { fail('Failed to create API key'); return; }
    }

    // Write to NextChat localStorage
    try {
      var storeKey = 'chat-next-web-store';
      var existing = {};
      try { var raw = localStorage.getItem(storeKey); if (raw) existing = JSON.parse(raw); } catch(e) {}
      existing.openaiApiKey = apiKey;
      localStorage.setItem(storeKey, JSON.stringify(existing));
    } catch(e) { fail('Failed to save to local storage.'); return; }

    // Go to NextChat
    window.location.href = '/chat' + window.location.search;
  })();
  </script>
</body>
</html>
