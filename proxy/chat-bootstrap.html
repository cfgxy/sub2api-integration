<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Preparing Chat...</title>
<style>
  body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
  .loader { border: 3px solid #334155; border-top: 3px solid #38bdf8; border-radius: 50%; width: 32px; height: 32px; animation: spin .8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .card { text-align: center; }
  .error { color: #f87171; display: none; margin-top: 12px; font-size: 14px; }
</style>
</head>
<body>
  <div class="card">
    <div class="loader" id="loader"></div>
    <p>Preparing Chat...</p>
    <p class="error" id="errorMsg"></p>
  </div>
  <script>
  (async function() {
    var errEl = document.getElementById('errorMsg');
    var loader = document.getElementById('loader');
    function fail(msg) { loader.style.display = 'none'; errEl.textContent = msg; errEl.style.display = 'block'; }

    var params = new URLSearchParams(window.location.search);
    var token = params.get('token');
    if (!token) { fail('No session. Please log into Sub2API first.'); return; }

    try {
      var resp = await fetch('/api/v1/user/profile', { headers: { 'Authorization': 'Bearer ' + token } });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
    } catch(e) { fail('Session expired. Please re-login.'); return; }

    var keyName = 'chat-key';
    var apiKey = null;

    try {
      var resp2 = await fetch('/api/v1/keys', { headers: { 'Authorization': 'Bearer ' + token } });
      if (resp2.ok) {
        var keys = (await resp2.json()).data.items || [];
        for (var k of keys) { if (k.name === keyName) { apiKey = k.key; break; } }
      }
    } catch(e) {}

    if (!apiKey) {
      try {
        var resp3 = await fetch('/api/v1/keys', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: keyName, quota: 0 })
        });
        if (resp3.ok) {
          apiKey = (await resp3.json()).data.key;
        } else if (resp3.status === 409) {
          var resp4 = await fetch('/api/v1/keys', { headers: { 'Authorization': 'Bearer ' + token } });
          var keys4 = (await resp4.json()).data.items || [];
          for (var k of keys4) { if (k.name === keyName) { apiKey = k.key; break; } }
        } else {
          throw new Error('HTTP ' + resp3.status);
        }
      } catch(e) { fail('Failed to create API key'); return; }
    }

    async function openDB(name, version, createStore) {
      return await new Promise(function(resolve, reject) {
        var req = version ? indexedDB.open(name, version) : indexedDB.open(name);
        req.onupgradeneeded = function() {
          if (createStore && !req.result.objectStoreNames.contains('keyval')) {
            req.result.createObjectStore('keyval');
          }
        };
        req.onsuccess = function() { resolve(req.result); };
        req.onerror = function() { reject(req.error); };
        req.onblocked = function() { reject(new Error('blocked')); };
      });
    }

    async function ensureDB() {
      var db = await openDB('keyval-store');
      if (db.objectStoreNames.contains('keyval')) return db;

      var nextVersion = (db.version || 1) + 1;
      db.close();
      return await openDB('keyval-store', nextVersion, true);
    }

    var db;
    try {
      db = await ensureDB();
    } catch(e) {
      fail('Failed to open IndexedDB.');
      return;
    }

    // Read existing config
    var existing = {};
    try {
      var raw = await new Promise(function(resolve, reject) {
        var tx = db.transaction('keyval', 'readonly');
        var req = tx.objectStore('keyval').get('access-control');
        req.onsuccess = function() { resolve(req.result); };
        req.onerror = function() { reject(req.error); };
      });
      if (raw) existing = JSON.parse(raw);
    } catch(e) { console.error(e) }

    if (!existing || typeof existing !== 'object') existing = {};
    if (!existing.state || typeof existing.state !== 'object') existing.state = {};
    if (typeof existing.version === 'undefined') existing.version = 2;

    existing.state.useCustomConfig = true;
    existing.state.openaiApiKey = apiKey;

    // Write back: double-stringified
    var value = JSON.stringify(existing);
    await new Promise(function(resolve, reject) {
      var tx = db.transaction('keyval', 'readwrite');
      tx.objectStore('keyval').put(value, 'access-control');
      tx.oncomplete = function() { resolve(); };
      tx.onerror = function() { reject(tx.error); };
    });

    db.close();
    window.location.href = '/chat' + window.location.search;
  })();
  </script>
</body>
</html>
